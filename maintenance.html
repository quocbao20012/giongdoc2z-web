<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>2z Studio - Đang nâng cấp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen text-center p-6">
    <div class="max-w-md bg-white p-10 rounded-[40px] shadow-2xl border border-slate-100">
        <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6">
            <i class="fa-solid fa-bolt-lightning text-4xl animate-pulse"></i>
        </div>
        <h1 class="text-3xl font-black text-slate-800 mb-4">Hệ thống đang quá tải!</h1>
        <p class="text-slate-500 leading-relaxed mb-8">
            Chào bạn, hiện tại lượng người dùng đang tăng đột biến do video TikTok. Chúng mình đang tạm dừng để nâng cấp băng thông.
        </p>
        <div class="bg-indigo-50 p-4 rounded-2xl mb-8">
            <p class="text-indigo-700 font-bold text-sm">Vui lòng quay lại sau 5-10 phút nữa nhé!</p>
        </div>
        <div class="flex justify-center gap-4 text-slate-400">
            <i class="fa-brands fa-tiktok text-xl"></i>
            <i class="fa-brands fa-facebook text-xl"></i>
            <i class="fa-solid fa-heart text-xl text-red-400"></i>
        </div>
    </div>
</body>
</html>
